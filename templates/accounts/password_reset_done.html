{% extends "base.html" %}
{% block title %}Check your email — Planforge{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:420px; text-align:center;">
    <div style="width:56px; height:56px; background:#f0f9f5; border:1px solid #b8dece;
                border-radius:1rem; display:flex; align-items:center; justify-content:center;
                margin:0 auto 1.5rem;">
      <svg style="width:26px; height:26px; color:#1f6b4f;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1 class="font-serif" style="font-size:1.5rem; font-weight:600; color:var(--text); margin-bottom:0.75rem;">
      Check your inbox
    </h1>
    <p style="color:var(--muted); font-size:0.9rem; line-height:1.6; margin-bottom:2rem;">
      If that email is registered, you'll receive a password reset link shortly.
      Check your spam folder if you don't see it.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn-ghost">Back to login</a>
  </div>
</div>
{% endblock %}
