{% extends "base.html" %}
{% block title %}Reset password — Planforge{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:420px;">

    <div style="text-align:center; margin-bottom:2rem;">
      <div style="width:56px; height:56px; background:var(--brand-lt); border-radius:1rem;
                  display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;">
        <svg style="width:26px; height:26px; color:var(--brand);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="font-serif" style="font-size:1.5rem; font-weight:600; color:var(--text);">Forgot your password?</h1>
      <p style="color:var(--muted); margin-top:0.375rem; font-size:0.9rem;">
        Enter your email and we'll send a reset link.
      </p>
    </div>

    <div class="auth-card">
      <form method="post" style="display:flex; flex-direction:column; gap:1.25rem;">
        {% csrf_token %}
        <div>
          <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
            Email address
          </label>
          <input type="email" name="email" required autofocus class="input" placeholder="you@example.com">
        </div>
        <button type="submit" data-spinner class="btn-primary" style="width:100%; justify-content:center;">
          <span class="spinner"></span>
          <span class="btn-text">Send reset link</span>
        </button>
      </form>
      <p style="text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--muted);">
        Remember it?
        <a href="{% url 'accounts:login' %}"
           style="color:var(--brand); font-weight:600; text-decoration:none;"
           onmouseover="this.style.textDecoration='underline'"
           onmouseout="this.style.textDecoration='none'">Sign in</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
