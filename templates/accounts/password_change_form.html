{% extends "base.html" %}
{% block title %}Change password — Planforge{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem;
              color:var(--muted); margin-bottom:0.625rem;">
    <a href="{% url 'accounts:profile' %}" style="color:var(--muted); text-decoration:none;"
       onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Profile</a>
    <span>›</span>
    <span style="color:var(--text);">Change password</span>
  </div>
  <h1 class="font-serif" style="font-size:1.6rem; font-weight:600; color:var(--text); margin-bottom:2rem;">
    Change password
  </h1>

  <div class="card" style="padding:2rem;">
    <form method="post" style="display:flex; flex-direction:column; gap:1.1rem;">
      {% csrf_token %}
      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
          Current password
        </label>
        <input type="password" name="old_password" required autofocus class="input" placeholder="Your current password">
      </div>

      <hr class="divider">

      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
          New password
        </label>
        <input type="password" name="new_password" required class="input"
               placeholder="Min. 8 characters, 1 uppercase, 1 number">
      </div>
      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
          Confirm new password
        </label>
        <input type="password" name="confirm_new_password" required class="input" placeholder="••••••••">
      </div>

      <div style="display:flex; gap:0.75rem; padding-top:0.25rem;">
        <button type="submit" data-spinner class="btn-primary">
          <span class="spinner"></span>
          <span class="btn-text">Update password</span>
        </button>
        <a href="{% url 'accounts:profile' %}" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
