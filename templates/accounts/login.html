{% extends "base.html" %}
{% block title %}Sign in — Planforge{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:420px;">

    <div style="text-align:center; margin-bottom:2rem;">
      <p class="font-serif" style="font-size:1.75rem; font-weight:600; color:#1F2933;">
        Plan<span style="color:#315C4B;">forge</span>
      </p>
      <p style="color:var(--muted); margin-top:0.375rem; font-size:0.9rem;">Welcome back</p>
    </div>

    <div class="auth-card">
      <form method="post" style="display:flex; flex-direction:column; gap:1.25rem;">
        {% csrf_token %}

        <div>
          <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
            Username
          </label>
          <input type="text" name="username" required autofocus class="input" placeholder="Your username">
        </div>

        <div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
            <label style="font-size:0.8rem; font-weight:600; color:var(--text);">Password</label>
            <a href="{% url 'accounts:password_reset' %}"
               style="font-size:0.75rem; color:var(--brand); text-decoration:none;"
               onmouseover="this.style.textDecoration='underline'"
               onmouseout="this.style.textDecoration='none'">
              Forgot password?
            </a>
          </div>
          <input type="password" name="password" required class="input" placeholder="••••••••">
        </div>

        <button type="submit" data-spinner class="btn-primary" style="width:100%; justify-content:center; margin-top:0.25rem;">
          <span class="spinner"></span>
          <span class="btn-text">Sign in</span>
        </button>
      </form>

      <p style="text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--muted);">
        Don't have an account?
        <a href="{% url 'accounts:register' %}"
           style="color:var(--brand); font-weight:600; text-decoration:none;"
           onmouseover="this.style.textDecoration='underline'"
           onmouseout="this.style.textDecoration='none'">
          Create one
        </a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
