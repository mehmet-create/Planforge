{% extends "base.html" %}
{% block title %}New Project — Planforge{% endblock %}

{% block content %}
<div style="max-width:580px;">
  <div style="margin-bottom:2rem;">
    <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--muted); margin-bottom:0.5rem;">
      <a href="{% url 'projects:list' %}" style="color:var(--muted); text-decoration:none;"
         onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Projects</a>
      <span>›</span>
      <span style="color:var(--text);">New</span>
    </div>
    <h1 class="font-serif" style="font-size:1.6rem; font-weight:600; color:var(--text);">Create a Project</h1>
    <p style="color:var(--muted); margin-top:0.25rem; font-size:0.9rem;">Inside {{ org.name }}</p>
  </div>

  <div class="card" style="padding:2rem;">
    <form method="post" style="display:flex; flex-direction:column; gap:1.25rem;">
      {% csrf_token %}
      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">Project name</label>
        <input type="text" name="name" required autofocus class="input" placeholder="e.g. Website Redesign"
               value="{{ form.name.value|default:'' }}">
      </div>
      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">
          Description <span style="color:var(--muted); font-weight:400;">(optional)</span>
        </label>
        <textarea name="description" rows="4" class="input" style="resize:none;"
                  placeholder="What is this project about?">{{ form.description.value|default:'' }}</textarea>
      </div>
      <div>
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--text); margin-bottom:0.5rem;">Status</label>
        <select name="status" class="input select">
          <option value="active">Active</option>
          <option value="on_hold">On Hold</option>
          <option value="completed">Completed</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <div style="display:flex; gap:0.75rem; padding-top:0.5rem;">
        <button type="submit" data-spinner class="btn-primary">
          <span class="spinner"></span>
          <span class="btn-text">Create Project</span>
        </button>
        <a href="{% url 'projects:list' %}" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
