{% extends "base.html" %}
{% block title %}Edit {{ project.name }} — Planforge{% endblock %}

{% block content %}
<div style="max-width:580px;">
  <div style="margin-bottom:2rem;">
    <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;">
      <a href="{% url 'projects:list' %}" style="color:var(--muted);text-decoration:none;"
         onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Projects</a>
      <span>›</span>
      <a href="{% url 'projects:detail' project_uuid=project.uuid %}"
         style="color:var(--muted);text-decoration:none;"
         onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
        {{ project.name }}
      </a>
      <span>›</span>
      <span style="color:var(--text);">Edit</span>
    </div>
    <h1 class="font-serif" style="font-size:1.6rem;font-weight:600;color:var(--text);">Edit Project</h1>
  </div>

  <div class="card" style="padding:2rem;">
    <form method="post" style="display:flex;flex-direction:column;gap:1.25rem;">
      {% csrf_token %}

      <div>
        <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">
          Project name
        </label>
        <input type="text" name="name" required class="input"
               value="{{ form.name.value|default:project.name }}">
      </div>

      <div>
        <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">
          Description
        </label>
        <textarea name="description" rows="4" class="input" style="resize:vertical;"
                  placeholder="What is this project about?">{{ form.description.value|default:project.description }}</textarea>
      </div>

      <div>
        <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">
          Status
        </label>
        <select name="status" class="input">
          {% for value, label in form.fields.status.choices %}
            <option value="{{ value }}"
              {% if form.status.value == value or project.status == value and not form.status.value %}selected{% endif %}>
              {{ label }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Budget row -->
      <div style="display:grid;grid-template-columns:1fr auto;gap:0.75rem;align-items:end;">
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">
            Budget <span style="color:var(--muted);font-weight:400;">(optional)</span>
          </label>
          <input type="number" name="budget" min="0" step="0.01" class="input"
                 placeholder="e.g. 25000"
                 value="{{ form.budget.value|default:project.budget|default:'' }}">
          {% if form.budget.errors %}
            <p style="font-size:0.72rem;color:var(--accent);margin-top:0.25rem;">{{ form.budget.errors|join:", " }}</p>
          {% endif %}
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">
            Currency
          </label>
          <select name="currency" class="input" style="width:auto;min-width:80px;">
            {% for value, label in form.fields.currency.choices %}
              <option value="{{ value }}"
                {% if form.currency.value == value or project.currency == value and not form.currency.value %}selected{% endif %}>
                {{ value }}
              </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;padding-top:0.25rem;">
        <button type="submit" data-spinner class="btn-primary">
          <span class="spinner"></span>
          <span class="btn-text">Save Changes</span>
        </button>
        <a href="{% url 'projects:detail' project_uuid=project.uuid %}" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
